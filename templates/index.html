<!DOCTYPE html>
<html>
<head>
    <title>Video Factory PRO</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1>🎬 Video Factory PRO</h1>
    <form id="form">
        <div class="upload">
            <input type="file" name="videos" multiple required>
        </div>
        <br>
        <textarea name="text" placeholder="Texto da narração (opcional)"></textarea>
        <br><br>
        <select name="voice">
            <optgroup label="🇧🇷 Português Brasil">
                <option value="pt-BR-FranciscaNeural">Francisca</option>
                <option value="pt-BR-AntonioNeural">Antonio</option>
            </optgroup>
            <optgroup label="🇺🇸 Inglês Natural">
                <option value="en-US-AriaNeural">Aria</option>
            </optgroup>
        </select>
        <br><br>
        <select name="resolution">
            <option value="720x1280">720x1280</option>
            <option value="1080x1920">1080x1920</option>
        </select>
        <br><br>
        <button type="submit">🚀 Processar Vídeos</button>
        <br><br>
    </form>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <div id="results"></div>

    <button id="downloadAll" style="display:none;">⬇️ Baixar Todos</button>
</div>
<script src="/static/script.js"></script>
</body>
</html>
